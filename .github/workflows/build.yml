name: Build

on: [push, pull_request]

permissions: {}

jobs:
  build:
    name: Build for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    concurrency:
      group: build-${{ github.ref }}-${{ matrix.name }}
      cancel-in-progress: true
    strategy:
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: windows
            os: windows-latest
            bin_extension: .exe
          - name: macos
            os: macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Configure Rust toolchain
        run: |
          rustup toolchain install 1.85.0 --profile minimal --no-self-update
          rustup default 1.85.0

      - name: Rust Cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6

      - name: Install dependencies (linux)
        run: |
          sudo apt-get update
          sudo apt-get -y install libgtk-3-dev libasound2-dev
        if: matrix.name == 'linux'

      - name: Build
        run: cargo build --release --locked -p bff-cli -p bff-gui --bins

      - name: Archive Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bff-${{ matrix.name }}-${{ github.sha }}
          path: |
            ./target/release/bff-cli${{ matrix.bin_extension }}
            ./target/release/bff-gui${{ matrix.bin_extension }}
