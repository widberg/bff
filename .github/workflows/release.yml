name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    name: Release for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    concurrency:
      group: release-${{ github.ref }}-${{ matrix.name }}
      cancel-in-progress: false
    permissions:
      contents: write # Required to create/edit releases and upload release assets.
    strategy:
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: windows
            os: windows-latest
            bin_extension: .exe
          - name: macos
            os: macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Configure Rust toolchain
        run: |
          rustup toolchain install 1.88.0 --profile minimal --no-self-update
          rustup default 1.88.0

      - name: Install dependencies (linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get -y install libgtk-3-dev libasound2-dev

      - name: Build
        run: cargo build --release --locked -p bff-cli --bins

      - name: Package release artifacts
        shell: bash
        env:
          MATRIX_NAME: ${{ matrix.name }}
          TAG_NAME: ${{ github.ref_name }}
          BIN_EXTENSION: ${{ matrix.bin_extension || '' }}
        run: |
          cd ./target/release
          7z a "../../bff-${MATRIX_NAME}-${TAG_NAME}.zip" \
            "bff-cli${BIN_EXTENSION}"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          asset_path="./bff-${MATRIX_NAME}-${TAG_NAME}.zip"
          prerelease_flag=()

          if [[ "$TAG_NAME" =~ -rc[0-9]+$ ]]; then
            prerelease_flag+=(--prerelease)
          fi

          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" "${prerelease_flag[@]}" || \
            gh release view "$TAG_NAME" >/dev/null 2>&1

          gh release upload "$TAG_NAME" "$asset_path" --clobber
